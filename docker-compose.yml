services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: ./backend
    env_file: ./backend/.env
    depends_on: [db, redis]
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    command: ["arq", "app.workers.tasks.WorkerSettings"]
    env_file: ./backend/.env
    depends_on: [redis]

  web:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on: [api]
    ports:
      - "3000:3000"

volumes:
  pgdata:
